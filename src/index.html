<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Search</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="container">
    <form class="form">
      <input class="search-input" type="text" name="search-text" autocomplete="off" placeholder="Search images..." />
      <button class="search-btn" type="submit">Search</button>
    </form>

    <ul class="gallery"></ul>

    <button class="load-more-btn is-hidden" type="button">Load more</button>

    <div class="loader is-hidden">Loading images, please wait...</div>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
